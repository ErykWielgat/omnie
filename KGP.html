<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLANER WYPRAW | KGP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,700;1,700&family=Exo+2:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  <link rel="stylesheet" href="style.css">
</head>
<body class="planner-body">
<canvas id="circuit-bg"></canvas>

<nav class="navbar navbar-expand-lg fixed-top navbar-elegant">
  <div class="container ">
    <a class="navbar-brand">ERYK.</a>
    <div class="collapse navbar-collapse justify-content-end">
      <ul class="navbar-nav align-items-center">
        <li><a class="nav-link" href="index.html">Start</a></li>
        <li><a class="nav-link" href="initiative.html">Inicjatywy</a></li>
        <li><a class="nav-link" href="aboutMe.html">o mnie</a></li>
        <li><a class="nav-link" href="KGP.html" >KGP</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="split-layout">

  <div class="map-section">
    <div id="map"></div>
  </div>

  <div class="archive-section">
    <h3 class="text-accent mb-4 italic">ARCHIWUM KGP</h3>

    <div class="db-controls mb-4">
      <input type="text" id="db-search" class="custom-input mb-3" placeholder="Szukaj szczytu...">

      <select id="db-filter" class="custom-input mb-3">
        <option value="all">Pokaż wszystkie</option>
        <option value="conquered">Tylko ZDOBYTE</option>
        <option value="unconquered">Do zdobycia</option>
      </select>

      <select id="db-sort" class="custom-input">
        <option value="default">Sortuj: Domyślnie (ID)</option>
        <option value="name-asc">Sortuj: Nazwa (A-Z)</option>
        <option value="height-desc">Sortuj: Wysokość (Max)</option>
        <option value="height-asc">Sortuj: Wysokość (Min)</option>
      </select>
    </div>

    <div class="d-flex justify-content-between text-secondary mb-3 pb-2" style="border-bottom: 1px solid rgba(255,128,0,0.3);">
      <span>Status misji:</span>
      <span><strong id="db-conquered-count" class="text-accent">0</strong> / <span id="db-total-count">0</span></span>
    </div>

    <div id="db-list" class="db-list">
    </div>
  </div>

</div>

<div id="mission-modal" class="modal-overlay hidden">
  <div class="glass-modal">
    <button id="close-modal" class="close-btn">&times;</button>
    <div class="modal-header">
      <span class="badge bg-accent text-dark mb-2" id="modal-region">PASMO</span>
      <h2 class="text-accent scramble-on-hover mb-0" id="modal-name">NAZWA SZCZYTU</h2>
      <p class="text-secondary mt-2" id="modal-desc"></p>
    </div>
    <div class="modal-grid mt-4">
      <div class="stat-box">
        <h6 class="text-muted">PARAMETRY TRASY</h6>
        <div class="stat-row"><span>Wysokość:</span> <strong id="m-height"></strong></div>
        <div class="stat-row"><span>Dystans:</span> <strong id="m-distance"></strong></div>
        <div class="stat-row"><span>Przewyższenie:</span> <strong id="m-elevation"></strong></div>
        <div class="stat-row"><span>Czas przejścia:</span> <strong id="m-time"></strong></div>
      </div>
      <div class="stat-box">
        <h6 class="text-muted">POGODA LIVE</h6>
        <div id="weather-loading" class="text-accent mt-2">Nawiązywanie połączenia...</div>
        <div id="weather-data" class="hidden">
          <div class="stat-row"><span>Temperatura:</span> <strong id="w-temp"></strong></div>
          <div class="stat-row"><span>Wiatr:</span> <strong id="w-wind"></strong></div>
          <div class="stat-row"><span>Warunki:</span> <strong id="w-cond"></strong></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="login-modal" class="modal-overlay hidden" style="z-index: 4000;">
  <div class="glass-modal" style="max-width: 400px; text-align: center;">
    <h3 class="text-accent mb-4 italic">AUTORYZACJA</h3>
    <input type="password" id="admin-password" class="custom-input mb-4" placeholder="Wprowadź kod dostępu...">
    <button id="login-btn" class="btn btn-elegant w-100">ODBLOKUJ PANEL</button>
  </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script type="module" src="./js/app.js"></script>
<button id="logout-btn" class="btn btn-outline-danger logout-fixed hidden">WYLOGUJ</button>
</body>
</html>
